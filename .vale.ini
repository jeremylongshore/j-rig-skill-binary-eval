StylesPath = .vale/styles
MinAlertLevel = warning

Vocab = IS

[*.md]
BasedOnStyles = Vale

# Vale.Terms is OFF. It enforces ONE canonical casing per vocabulary term, which
# is structurally wrong for this repo's house style: ALL-CAPS carries normative
# emphasis, vendor and product names have their own casing (DeepSeek, OpenRouter,
# Caddy, Sigstore, JRig), and any term is capitalized sentence-initially. Every
# Terms finding measured 2026-07-22 was a false positive of exactly that kind.
# Worse, the noise REGENERATES: each new accept.txt entry produces fresh Terms
# findings the first time someone starts a sentence with it, so this is a
# permanent condition rather than a one-time cleanup.
#
# Vale.Spelling and Vale.Avoid stay ON and are at zero — those produce actionable
# output. Disabling a rule whose entire output is false positives is not gate
# weakening; keeping it is, because a permanently-red lane is one nobody reads.
Vale.Terms = NO

# Skip YAML frontmatter — Vale doesn't parse it
TokenIgnores = (?s)(^---\n.*?\n---\n)
BlockIgnores = (?s) *(```.*?```)
