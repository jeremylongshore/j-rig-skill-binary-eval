# Gemini Code Assist — Intent Eval Platform.
# Gemini is the WORKHORSE code reviewer (design/logic/correctness/cross-artifact
# consistency). CodeQL owns security scanning (security-extended, non-overlapping).
# Review priorities: .gemini/styleguide.md
# Posture (re-instated 2026-06-24): Gemini is the ACTIVE AI reviewer. The
# Greptile review quota is exhausted; its advisory .greptile/ config stays in
# place and resumes when the quota resets. Both AI reviewers are advisory — the
# required merge gate is each repo's own CI (+ CodeQL for security).
have_fun: false
code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: -1
  pull_request_opened:
    help: false
    summary: true
    code_review: true
# NOTE: _generated/ is intentionally NOT ignored — three-way schema/validator/Pydantic
# drift hides there (a real class of one-way-door bug). Gemini must review it.
ignore_patterns:
  - "**/dist/**"
  - "**/node_modules/**"
  - "**/coverage/**"
  - "**/*.snap"
  - "pnpm-lock.yaml"
  - "**/*.lock"
