# Codecov configuration for jeremylongshore/j-rig-skill-binary-eval
#
# Monorepo: packages/cli, packages/core, packages/db, packages/dashboard,
# packages/rollout-gate (decision-logic library). vitest aggregates coverage
# at root via @vitest/coverage-v8.
#
# Posture:
# - project target: auto (no regression vs current baseline) + 2% slack
# - patch target: 50% (no existing coverage baseline yet; start modest and
#   ratchet up as test surface grows per package)
# - if_ci_failed: success (Codecov outage must not red-X CI)
# - only_pulls: true (don't gate bot-driven push streams to main)
# - components: per-package split so per-pkg coverage trends are visible

codecov:
  require_ci_to_pass: false

coverage:
  precision: 2
  round: down
  range: '30...100'

  status:
    project:
      default:
        target: auto
        threshold: 2%
        if_ci_failed: success
        only_pulls: true
    patch:
      default:
        target: 50%
        threshold: 10%
        if_ci_failed: success
        only_pulls: true

comment:
  layout: 'condensed_header, diff, flags, components, files'
  behavior: default
  require_changes: true
  require_base: false
  require_head: true

ignore:
  # Documentation — never measured
  - '**/*.md'
  - '**/*.mdx'
  - '000-docs/**'
  - 'docs/**'

  # Test files — measurers, not measured
  - 'packages/**/src/**/*.test.ts'
  - 'packages/**/src/**/*.spec.ts'
  - 'tests/**/*.test.ts'
  - '**/__fixtures__/**'

  # Build outputs + generated artifacts
  - 'packages/**/dist/**'
  - 'packages/**/build/**'
  - 'coverage/**'
  - '**/*.generated.*'
  - '**/generated/**'
  - 'node_modules/**'

flag_management:
  default_rules:
    carryforward: true

component_management:
  individual_components:
    - component_id: cli
      name: cli
      paths:
        - 'packages/cli/**'

    - component_id: core
      name: core
      paths:
        - 'packages/core/**'

    - component_id: db
      name: db
      paths:
        - 'packages/db/**'

    - component_id: dashboard
      name: dashboard
      paths:
        - 'packages/dashboard/**'

    - component_id: rollout-gate
      name: rollout-gate
      paths:
        - 'packages/rollout-gate/**'
