name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Format check (Prettier)
        run: pnpm run format:check

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      - name: Typecheck
        run: pnpm run typecheck

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Enforcement wall: the vendored audit-harness wrapper verifies the
      # hash-pinned policy surface (the coverage floor in vitest.config.ts). A
      # silent threshold downgrade trips HARNESS_TAMPERED (exit 2) and reds CI.
      - name: Audit-harness version (smoke)
        run: scripts/audit-harness --version

      - name: Audit-harness verify (hash-pinned policy artifacts)
        run: pnpm run harness:verify

      - name: Build
        run: pnpm run build

      # test:coverage enforces the ratchet-from-here coverage floor declared in
      # vitest.config.ts (thresholds block). Floor is the measured baseline
      # rounded down — green today, can only ratchet up.
      - name: Test (with coverage floor enforced)
        run: pnpm run test:coverage

      # Per-package coverage gate for @intentsolutions/refiner-core (bd_000-projects-214c.4).
      # Scoped to refiner-core sources only, so a refiner-core regression reds the
      # PR even when masked/diluted in the global floor above. Floor is >= 80% on
      # every dimension per the bead (current measured: 96.64% lines, 90.83%
      # branches, 100% functions). The scoped vitest.config.ts is hash-pinned in
      # .harness-hash-extra-patterns, so a silent downgrade trips HARNESS_TAMPERED.
      - name: Test (refiner-core per-package coverage gate)
        run: pnpm run test:coverage:refiner-core

      - name: Upload coverage to Codecov
        if: always()
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage/coverage-final.json
          flags: typescript
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  otel-smoke:
    name: OTel emission smoke (iaj-E08)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm run build

      # End-to-end smoke: a full eval (stub providers, J_RIG_OTEL=1) must emit
      # every event name the 067 runtime-event taxonomy binds j-rig to emit,
      # each carrying eval.run_id (067 § 4.2). Guards the cross-emitter pin
      # (Gregg finding #2) so a name regression reds CI rather than drifting
      # silently from the audit-harness iah-E07 emitter.
      - name: OTel emission smoke
        run: bash scripts/otel-smoke.sh
