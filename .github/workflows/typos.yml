name: Typos

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: typos-${{ github.ref }}
  cancel-in-progress: true

# REQUIRED gate: a spelling hit reds the PR. Legitimate domain vocabulary is
# allow-listed in .typos.toml (extend-words / extend-exclude), NOT silenced
# wholesale. A green required check is signal; a red advisory check is noise.
jobs:
  typos:
    name: typos
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v7
      - name: Spell-check with crate-ci/typos
        uses: crate-ci/typos@v1.47.2
