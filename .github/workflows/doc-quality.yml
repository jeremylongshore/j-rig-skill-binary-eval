name: Doc Quality

on:
  pull_request:
    paths:
      - "**/*.md"
      - ".markdownlint-cli2.jsonc"
      - ".audit-harness/configs/markdownlint.yaml"
      - ".vale.ini"
      - ".vale/**"
      - "lychee.toml"
      - ".github/workflows/doc-quality.yml"
  push:
    branches: [main]
    paths:
      - "**/*.md"

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: doc-quality-${{ github.ref }}
  cancel-in-progress: true

# markdownlint + lychee are REQUIRED (a green required check is signal); they own
# Markdown style and link integrity respectively, and run nowhere else (de-duped
# from lint.yml). Vale (prose style) STAYS advisory — prose voice should not block
# code.
jobs:
  markdownlint:
    name: markdownlint-cli2
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm exec markdownlint-cli2

  vale:
    name: Vale (prose lint, advisory)
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: errata-ai/vale-action@reviewdog
        with:
          version: 3.9.1
          files: '["000-docs/", "README.md", "CLAUDE.md", "AGENTS.md"]'
          fail_on_error: false
          reporter: github-pr-check

  link-check:
    name: lychee
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: lycheeverse/lychee-action@v2
        with:
          args: --offline --config lychee.toml "**/*.md"
          fail: true
