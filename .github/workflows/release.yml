name: Release

# Creates a GitHub Release for j-rig-binary-eval on tag push v*.*.*.
#
# Triggered by pushing an annotated tag (e.g., v1.0.1). The job:
#   1. Re-runs the full check chain (build + lint + typecheck + test)
#   2. Verifies package.json#version matches the pushed tag (defends against
#      tag-vs-package-version drift — same gate as intent-eval-core uses)
#   3. Creates a GitHub Release with auto-generated notes
#
# Version bumping is a PR-flow concern (engineer opens PR with package.json
# bump + CHANGELOG entry, merges to main, then manually tags from main HEAD).
# The previous auto-bump-on-push-to-main logic was removed because the
# git-push step of that flow can't cross branch protection on main without
# an admin override — see closed bead bd_000-projects-bj5m.

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write  # for GH release creation

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false  # tag pushes are race-safe; never cancel

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          # ISEDC E09 DR / CISO reproducible-from-tag invariant: pin the
          # checkout to the pushed tag ref, never the branch default. The
          # release build's bytes are what downstream consumers attribute to
          # this tag; an implicit checkout is the #32-class one-way-door risk.
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Verify tag matches package.json version
        run: |
          tag_version="${GITHUB_REF#refs/tags/v}"
          pkg_version=$(node -p "require('./package.json').version")
          if [ "$tag_version" != "$pkg_version" ]; then
            echo "::error::Tag v$tag_version does not match package.json version $pkg_version. Bump package.json (or correct the tag) and re-push."
            exit 1
          fi
          echo "Tag and package version both: $tag_version"

      - name: Build workspace packages
        # @j-rig/cli imports @j-rig/core via the `exports` field which points
        # at dist/. Tests/checks fail to resolve workspace imports unless dist
        # exists. Matches ci.yml build-before-test invariant (PR #76).
        run: pnpm run build

      - name: Lint
        run: pnpm run lint

      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          NEXT="${GITHUB_REF#refs/tags/}"
          gh release create "$NEXT" \
            --title "j-rig-binary-eval $NEXT" \
            --generate-notes \
            --latest

  # ── Emit this repo's own testing evidence for the dashboard (bead nr75.11) ──
  #
  # Runs j-rig's real deterministic gate(s) → kernel gate-result/v1 row(s) →
  # kernel EvidenceBundle(s) (scripts/emit-evidence.ts, fail-closed against the
  # @intentsolutions/core schemas pinned to the version the dashboard verifies
  # with), keyless-signs each bundle's CANONICAL bytes with cosign (Fulcio OIDC +
  # Rekor), assembles report-manifest.json (scripts/assemble-manifest.ts), and
  # uploads it onto this tag's Release. The dashboard's HttpManifestFetcher is
  # pointed at:
  #   https://github.com/jeremylongshore/j-rig-skill-binary-eval/releases/latest/download/report-manifest.json
  # and re-verifies OIDC subject + Rekor inclusion + DSSE + kernel schema at
  # ingest (it never trusts this manifest at render time).
  #
  # The signing identity is this workflow's reusable-workflow ref
  # (release.yml@refs/tags/vX.Y.Z), which matches the dashboard's pinned
  # allowlist entry for `iaj` once operatorConfirmed is flipped.
  emit-evidence:
    name: Emit signed gate-result evidence for the dashboard
    needs: release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: write # upload the manifest onto the Release
      id-token: write # cosign keyless (Fulcio OIDC)

    steps:
      - name: Checkout with full history
        uses: actions/checkout@v4
        with:
          # ISEDC E09 DR / CISO reproducible-from-tag invariant: the evidence
          # emitted+signed below is built from THIS checkout's bytes. Pin it to
          # the pushed tag — signing the wrong bytes is unrecoverable provenance
          # (#32-class one-way door).
          ref: ${{ github.ref }}
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build workspace packages (coverage runs the workspace tests)
        run: pnpm run build

      - name: Emit-evidence self-check (kernel-valid + canonical-stable)
        run: node --experimental-strip-types scripts/emit-evidence.ts --self-check

      - name: Emit gate-result/v1 EvidenceBundle(s)
        run: node --experimental-strip-types scripts/emit-evidence.ts --out build/evidence --ref "${GITHUB_REF}"

      - name: Sign each EvidenceBundle (cosign keyless → Rekor)
        run: |
          set -euo pipefail
          shopt -s nullglob
          signed=0
          for bundle in build/evidence/bundle-*.json; do
            case "$bundle" in *.sigstore.json) continue;; esac
            sig="${bundle%.json}.sigstore.json"
            echo "::group::cosign sign-blob $bundle"
            # --new-bundle-format emits the sigstore protobuf Bundle the
            # dashboard's sigstore-js verify() consumes. WITHOUT it, cosign writes
            # the legacy shape, which sigstore.verify() cannot parse.
            cosign sign-blob --yes --new-bundle-format --bundle "$sig" "$bundle"
            echo "::endgroup::"
            signed=$((signed + 1))
          done
          if [ "$signed" -eq 0 ]; then
            echo "::error::no EvidenceBundles were produced to sign"
            exit 1
          fi
          echo "✓ signed $signed bundle(s)"

      - name: Assemble report-manifest.json (fail-closed on shape mismatch)
        run: node --experimental-strip-types scripts/assemble-manifest.ts --dir build/evidence --out build/evidence/report-manifest.json

      - name: Publish report-manifest.json onto the Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          tag="${GITHUB_REF#refs/tags/}"
          # The release job created the Release; upload/clobber the asset onto it.
          # create-or-upload stays idempotent if the job is ever re-run.
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" build/evidence/report-manifest.json --clobber
          else
            gh release create "$tag" build/evidence/report-manifest.json \
              --title "j-rig-binary-eval $tag" --generate-notes --latest
          fi
          echo "✓ report-manifest.json published to release $tag"

  # ── Fire a tailnet-only ntfy alert when the tag-release fails (bead 59tx) ──
  #
  # Tag-triggered only — this never runs on a PR. It fires solely on a future
  # FAILED tag-release of release/emit-evidence, joins the tailnet via Tailscale
  # OIDC, and POSTs a high-priority ntfy alert to the tailnet-only prod-deploys
  # topic so an operator is paged the moment a release CI run goes red.
  alert-on-failure:
    name: alert-on-failure
    needs: [release, emit-evidence]
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write # Tailscale OIDC

    steps:
      - name: Join tailnet via Tailscale OIDC
        uses: tailscale/github-action@v4.1.2
        with:
          oauth-client-id: ${{ secrets.TS_OIDC_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_AUDIENCE }}
          tags: tag:ci

      - name: Wait for tailnet
        run: |
          for i in $(seq 1 20); do
            if sudo tailscale ping --c 1 --timeout 2s 100.88.144.55; then
              echo "✓ tailnet reachable"
              exit 0
            fi
            echo "tailnet not ready yet (attempt $i/20)…"
            sleep 2
          done
          echo "::error::tailnet never became reachable (100.88.144.55)"
          exit 1

      - name: Notify ntfy
        env:
          NTFY_AUTH_TOKEN: ${{ secrets.NTFY_AUTH_TOKEN }}
        run: |
          run_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -m 10 -X POST http://intentsolutions:8080/prod-deploys \
            -H "Title: [j-rig-skill-binary-eval] Release CI FAILED" \
            -H "Priority: high" \
            -H "Tags: prod-deploys,rotating_light" \
            -H "Authorization: Bearer ${NTFY_AUTH_TOKEN}" \
            --data "Release CI failed on ref ${{ github.ref_name }} (sha ${{ github.sha }}). Run: ${run_url}"

  # ── Notify the platform umbrella to regenerate its aggregate changelog ──
  #
  # The umbrella repo intent-solutions-io/intent-eval-platform keeps an aggregate
  # CHANGELOG.md regenerated from every platform repo's GitHub Releases. It already
  # regenerates daily + on workflow_dispatch + on a repository_dispatch of type
  # "release-published". This job pings the umbrella the moment a release here is
  # published so the aggregate updates instantly instead of waiting up to a day.
  #
  # WHY a job inside release.yml (not a standalone `on: release: published`):
  # GitHub suppresses workflow events triggered by a release that was created with
  # the default GITHUB_TOKEN (as the `release` job does above), so an
  # `on: release: published` workflow would never fire. Running the notify as a
  # job in this same workflow, after the release exists, is the reliable path.
  notify-umbrella-changelog:
    name: Notify umbrella to regenerate the platform changelog
    needs: [release, emit-evidence]
    runs-on: ubuntu-latest
    continue-on-error: true # best-effort; the umbrella's daily schedule is the backstop
    permissions:
      contents: read
    steps:
      - name: Dispatch release-published to the platform umbrella
        env:
          DISPATCH_TOKEN: ${{ secrets.UMBRELLA_DISPATCH_TOKEN }}
        run: |
          if [ -z "${DISPATCH_TOKEN}" ]; then
            echo "UMBRELLA_DISPATCH_TOKEN not configured — skipping umbrella notify (its daily schedule still picks up this release)."
            exit 0
          fi
          curl -sS --fail-with-body -X POST \
            -H "Authorization: Bearer ${DISPATCH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -H "X-GitHub-Api-Version: 2022-11-28" \
            https://api.github.com/repos/intent-solutions-io/intent-eval-platform/dispatches \
            -d "{\"event_type\":\"release-published\",\"client_payload\":{\"repo\":\"${GITHUB_REPOSITORY}\",\"ref\":\"${GITHUB_REF_NAME}\"}}"
          echo "Dispatched release-published to intent-solutions-io/intent-eval-platform."
