name: Lint (YAML + Actions)

# Deterministic L1 lint for the CI-config surface: yamllint + actionlint.
# ESLint/Prettier run inside ci.yml (`pnpm run check` + the prettier format gate);
# markdownlint runs in doc-quality.yml (its single home — de-duplicated from here).
# These two jobs are REQUIRED, not advisory: a green required check is signal, a
# red advisory check is noise. yamllint runs --strict so warnings fail the gate.
#
# Configs are vendored so the policy travels with the repo:
#   - YAML:    .yamllint.yaml (extends .audit-harness/configs/yamllint.yaml)
#   - Actions: actionlint (built-in rule set)

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths:
      - "**/*.yml"
      - "**/*.yaml"

permissions:
  contents: read

concurrency:
  group: lint-${{ github.ref }}
  cancel-in-progress: true

jobs:
  yamllint:
    name: yamllint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install yamllint
        run: pip install --no-cache-dir "yamllint==1.35.1"

      - name: Run yamllint (--strict — warnings fail the gate)
        run: |
          yamllint --strict \
            --config-file .yamllint.yaml \
            .github/ codecov.yml

  actionlint:
    name: actionlint
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Lint workflow YAML with rhysd/actionlint
        uses: reviewdog/action-actionlint@v1
        with:
          reporter: github-pr-check
          level: error
          fail_level: error
