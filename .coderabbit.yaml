# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit — j-rig-binary-eval (Intent Eval Platform). Semantic AI code review. Three
# non-overlapping layers: L1 deterministic CI (prettier/markdownlint/yamllint/
# actionlint/typos[/eslint/ruff]) owns style; CodeRabbit (here) owns semantic
# review; CodeQL (security-extended) owns security. CodeRabbit's built-in linters
# are disabled so it never re-reports what L1 already gates. Terse, assertive,
# findings-only. gitleaks (CodeRabbit-native secret scan) stays ON.
language: en-US
tone_instructions: "Be terse and technical. No preamble, praise, poems, or summaries — findings only: the problem, the file and line, the concrete fix. Flag every real issue; never soft-pedal or skip. Hardcore code review, not a status report."
reviews:
  profile: assertive
  request_changes_workflow: true
  high_level_summary: false
  changed_files_summary: false
  sequence_diagrams: false
  poem: false
  review_status: false
  in_progress_fortune: false
  estimate_code_review_effort: false
  assess_linked_issues: false
  related_issues: false
  related_prs: false
  suggested_labels: false
  collapse_walkthrough: true
  auto_review:
    enabled: true
    drafts: false
    base_branches:
      - main
  tools:
    eslint:
      enabled: false
    ruff:
      enabled: false
    markdownlint:
      enabled: false
    yamllint:
      enabled: false
    actionlint:
      enabled: false
    shellcheck:
      enabled: false
  path_filters:
    - "!**/dist/**"
    - "!**/node_modules/**"
    - "!**/coverage/**"
    - "!**/*.snap"
    - "!**/*.lock"
    - "!pnpm-lock.yaml"
  path_instructions:
    - path: "**/src/**"
      instructions: >-
        j-rig behavioral-eval + rollout-gate review. This monorepo consumes the signed
        @intentsolutions/core contracts and emits @intentsolutions/rollout-gate decisions
        that gate real ship/no-ship. Flag, by priority: (1) drift from the kernel contract it
        consumes — a local re-declaration of an entity/schema the kernel owns (import, never
        redefine), or a schema version pin that lags the kernel's published shape. (2)
        rollout-gate decision logic whose predicate does not match its stated contract — a
        gate that can pass on a regressed eval, an off-by-one threshold, an unreachable
        branch, or a default that fails-open instead of fail-closed. (3) provider-adapter
        non-determinism — unseeded sampling, unpinned model id, or temperature that makes an
        eval irreproducible; a provider error swallowed into a false PASS. (4) a
        docblock/README claiming behavior the code does not implement. (5) a non-additive
        change to a published @j-rig/* or @intentsolutions/* surface (removed/retyped export,
        loosened type) without a major bump.
    - path: "**/*.{sh,yml,yaml}"
      instructions: >-
        Flag CI/release scripts that silently no-op (a guard that can never fire, a test
        bypass left enabled, a publish step unpinned to @latest) and unsafe bash array
        expansion under `set -u` (use `${ARR[@]+"${ARR[@]}"}`).
chat:
  auto_reply: true
